<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLO LEVELING — Senior Engineer Ascension</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-abyss: #06060e;
    --bg-deep: #0b0b18;
    --bg-card: #0f0f1e;
    --bg-card-hover: #141428;
    --border-dim: #1a1a30;
    --border-mid: #252545;
    --text-primary: #e0e0f0;
    --text-secondary: #8888aa;
    --text-dim: #555577;
    --mana-blue: #00b4d8;
    --shadow-purple: #7b2ff7;
    --heal-green: #00e676;
    --boss-gold: #ffc107;
    --crit-red: #ff1744;
    --legendary: #ff006e;
    --xp-bar: #7b2ff7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-abyss);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* PARTICLE CANVAS */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* GRAIN OVERLAY */
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 8px var(--glow-color)); }
    50% { filter: drop-shadow(0 0 24px var(--glow-color)); }
  }
  @keyframes rankFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes progressGrow {
    from { width: 0; }
    to { width: var(--target-width); }
  }
  @keyframes checkPop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }
  @keyframes borderGlow {
    0%, 100% { border-color: var(--glow-color); box-shadow: 0 0 15px color-mix(in srgb, var(--glow-color) 30%, transparent); }
    50% { border-color: var(--glow-color); box-shadow: 0 0 30px color-mix(in srgb, var(--glow-color) 50%, transparent); }
  }
  @keyframes titleShimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes levelUp {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.15); filter: brightness(1.8); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-abyss); }
  ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

  /* STICKY HEADER */
  .status-bar {
    position: sticky; top: 0; z-index: 40;
    background: linear-gradient(180deg, rgba(6,6,14,0.97), rgba(6,6,14,0.88));
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border-dim);
    padding: 14px 20px;
  }
  .status-inner {
    max-width: 940px; margin: 0 auto;
    display: flex; align-items: center; gap: 16; flex-wrap: wrap;
  }
  .rank-badge {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: 22px;
    border: 2px solid; flex-shrink: 0;
    animation: rankFloat 3s ease-in-out infinite;
  }
  .status-info { flex: 1; min-width: 160px; }
  .status-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .xp-bar-wrap {
    display: flex; align-items: center; gap: 10;
  }
  .xp-bar {
    flex: 1; height: 6px; background: var(--bg-card);
    border-radius: 3px; overflow: hidden;
  }
  .xp-fill {
    height: 100%; border-radius: 3px;
    animation: progressGrow 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .level-num {
    font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .quest-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim); flex-shrink: 0;
  }

  /* MAIN CONTENT */
  .container {
    max-width: 940px; margin: 0 auto;
    padding: 24px 16px 80px;
    position: relative; z-index: 2;
  }

  /* HERO */
  .hero {
    text-align: center; margin-bottom: 36px;
    animation: fadeInUp 0.8s ease-out;
  }
  .hero-pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 8px; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .hero h1 {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    background: linear-gradient(90deg, var(--shadow-purple), var(--mana-blue), var(--shadow-purple), var(--mana-blue));
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleShimmer 4s linear infinite;
    line-height: 1.2;
  }
  .hero-sub {
    font-size: 14px; color: var(--text-secondary); margin-top: 6px;
    font-weight: 300; letter-spacing: 1px;
  }
  .hero-quote {
    font-size: 12px; color: var(--text-dim); margin-top: 8px;
    font-style: italic;
  }

  /* GATE TABS */
  .gate-tabs {
    display: flex; gap: 6px; margin-bottom: 28px;
    overflow-x: auto; padding-bottom: 6px;
    scrollbar-width: none;
  }
  .gate-tabs::-webkit-scrollbar { display: none; }
  .gate-tab {
    flex: 0 0 auto; min-width: 88px;
    padding: 12px 14px; border-radius: 10px;
    cursor: pointer; border: 2px solid var(--border-dim);
    background: var(--bg-card); text-align: center;
    transition: all 0.25s;
    font-family: inherit;
    color: var(--text-primary);
  }
  .gate-tab:hover { background: var(--bg-card-hover); }
  .gate-tab.active {
    animation: borderGlow 3s ease-in-out infinite;
  }
  .gate-tab .rank-letter {
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: 20px;
    display: block;
  }
  .gate-tab .rank-letter.complete { animation: glowPulse 2s infinite; }
  .gate-tab .tab-duration {
    font-size: 9px; color: var(--text-dim); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .gate-tab .tab-pct {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    margin-top: 3px;
  }

  /* GATE HEADER */
  .gate-header {
    padding: 24px 28px; border-radius: 14px;
    margin-bottom: 20px; border: 1px solid;
    animation: fadeIn 0.5s ease-out;
  }
  .gate-header .rank-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    padding: 4px 10px; border-radius: 5px; margin-right: 10px;
  }
  .gate-header .duration-tag {
    font-size: 11px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .gate-header h2 {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 22px; margin: 10px 0 4px;
  }
  .gate-header .theme {
    font-size: 14px; color: var(--text-secondary);
    font-style: italic; font-weight: 300; line-height: 1.6;
  }
  .gate-progress-bar {
    margin-top: 14px; height: 4px;
    background: var(--bg-abyss); border-radius: 2px; overflow: hidden;
  }
  .gate-progress-fill {
    height: 100%; border-radius: 2px;
    animation: progressGrow 1s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .gate-progress-text {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim); margin-top: 6px;
  }

  /* QUEST CARDS */
  .quest-list { display: flex; flex-direction: column; gap: 10px; }

  .quest-card {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border-dim);
    background: var(--bg-card);
    transition: all 0.25s;
  }
  .quest-card.expanded {
    border-color: var(--quest-color);
  }

  .quest-header {
    width: 100%; padding: 14px 18px;
    cursor: pointer; border: none; background: transparent;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 12;
    font-family: 'Rajdhani', sans-serif;
    transition: background 0.15s;
  }
  .quest-header:hover { background: var(--bg-card-hover); }

  .quest-type-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    padding: 4px 8px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .quest-title {
    flex: 1; font-size: 15px; font-weight: 600;
    text-align: left;
  }
  .quest-counter {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    flex-shrink: 0;
  }
  .quest-arrow {
    font-size: 10px; color: var(--text-dim);
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .quest-arrow.open { transform: rotate(180deg); }

  /* TASK ITEMS */
  .task-list { padding: 0 18px 16px; }

  .task-item {
    display: flex; align-items: flex-start; gap: 12;
    padding: 10px 10px; cursor: pointer;
    border-radius: 6px; transition: background 0.15s;
    border: none; background: transparent; width: 100%;
    text-align: left; color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
  }
  .task-item:hover { background: rgba(123,47,247,0.04); }
  .task-item.done { background: rgba(0,230,118,0.03); }

  .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    flex-shrink: 0; margin-top: 2px;
    border: 2px solid var(--border-mid);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .checkbox.checked {
    border: none;
    animation: checkPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .task-text {
    font-size: 13px; line-height: 1.6; font-weight: 400;
    transition: all 0.2s;
  }
  .task-text.done {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
  }

  /* LEVEL UP FLASH */
  .level-up-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,6,14,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    animation: fadeIn 0.3s;
    cursor: pointer;
  }
  .level-up-rank {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: 120px; animation: levelUp 1.5s ease-in-out infinite;
  }
  .level-up-title {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 28px; margin-top: 10px; letter-spacing: 3px;
  }
  .level-up-subtitle {
    font-size: 16px; color: var(--text-secondary);
    margin-top: 8px; font-weight: 300;
  }
  .level-up-dismiss {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    margin-top: 40px; letter-spacing: 2px;
    animation: fadeIn 2s;
  }

  /* SACRED TEXTS */
  .books-section { margin-top: 36px; }
  .books-toggle {
    width: 100%; padding: 16px 18px; border-radius: 10px;
    cursor: pointer; border: 1px solid var(--border-dim);
    background: var(--bg-card); color: var(--text-primary);
    display: flex; align-items: center; gap: 12;
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
    transition: background 0.15s;
  }
  .books-toggle:hover { background: var(--bg-card-hover); }
  .book-item {
    display: flex; align-items: center; gap: 14;
    padding: 12px 18px; border-bottom: 1px solid var(--border-dim);
  }
  .book-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
    padding: 3px 7px; border-radius: 3px;
    background: rgba(123,47,247,0.15); color: var(--shadow-purple);
    white-space: nowrap;
  }
  .book-title { font-size: 14px; font-weight: 600; }
  .book-author { font-size: 11px; color: var(--text-dim); }

  /* EXPORT/IMPORT & RESET */
  .footer-actions {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 44px; flex-wrap: wrap;
  }
  .footer-btn {
    padding: 8px 22px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border-mid); background: transparent;
    color: var(--text-dim); font-size: 11px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .footer-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .footer-btn.danger:hover { border-color: var(--crit-red); color: var(--crit-red); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--shadow-purple);
    padding: 10px 24px; border-radius: 8px; z-index: 60;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--shadow-purple);
    box-shadow: 0 0 30px rgba(123,47,247,0.3);
    animation: fadeInUp 0.3s ease-out;
  }

  /* HIDDEN FILE INPUT */
  #importInput { display: none; }

  @media (max-width: 600px) {
    .status-inner { gap: 10px; }
    .rank-badge { width: 40px; height: 40px; font-size: 18px; }
    .gate-tab { min-width: 72px; padding: 10px 10px; }
    .gate-header { padding: 18px 20px; }
    .gate-header h2 { font-size: 18px; }
    .quest-header { padding: 12px 14px; }
    .task-list { padding: 0 14px 14px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="grain"></div>

<div id="app"></div>
<input type="file" id="importInput" accept=".json">

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const RANKS = [
  { rank:"E", title:"E-Rank Hunter", subtitle:"The Awakening", color:"#6b7280", glow:"rgba(107,114,128,0.4)" },
  { rank:"D", title:"D-Rank Hunter", subtitle:"Foundation Forged", color:"#00b4d8", glow:"rgba(0,180,216,0.4)" },

  { rank:"S", title:"S-Rank Hunter", subtitle:"Shadow Monarch", color:"#ff1744", glow:"rgba(255,23,68,0.5)" },
];

const GATES = [
  {
    rank:0, gate:"Gate of Awakening", duration:"Month 1–2",
    theme:"You were the weakest hunter. But the System chose you.",
    quests:[
      { type:"MAIN QUEST", title:"Master the Language of Machines", tasks:[
        {id:"e1",text:"Deep dive into ONE language (Go / Java / C++) — understand memory model, concurrency primitives, garbage collection"},

        {id:"e3",text:"Solve 50 LeetCode problems (Easy→Medium) focusing on arrays, strings, hash maps, two pointers"},

  {

        {id:"d1",text:"Master TCP/IP stack: 3-way handshake, congestion control, sliding window, TIME_WAIT"},

      { type:"MAIN QUEST", title:"Database Internals", tasks:[

      { type:"SIDE QUEST", title:"Linux & Tooling Mastery", tasks:[

      { type:"MAIN QUEST", title:"Message Queues & Event Systems", tasks:[

        {id:"c8",text:"Build a mini pub/sub system with at-least-once delivery guarantees"},

      { type:"BOSS RAID", title:"🏰 Design Your First Large System", tasks:[

  {

      { type:"BOSS RAID", title:"🏰 Architect-Level Design Challenges", tasks:[
        {id:"b9",text:"Design a ride-hailing system like Grab (matching, ETA, surge pricing, geo-indexing)"},

  {

      { type:"MAIN QUEST", title:"Advanced Algorithms & Performance", tasks:[

        {id:"a7",text:"Profile and optimize a real application: find bottlenecks, reduce p99 latency by 50%"},

      { type:"SIDE QUEST", title:"Cloud & Infrastructure", tasks:[
        {id:"a8",text:"Master Kubernetes internals: scheduler, etcd, pod lifecycle, HPA, resource limits"},
        {id:"a9",text:"Understand Infrastructure as Code: Terraform state management, modules, blast radius"},
        {id:"a10",text:"Design CI/CD pipelines with canary deployments, feature flags, A/B testing infrastructure"},
      ]},
    ],
  },
  {
    rank:5, gate:"Gate of the Shadow Monarch", duration:"Month 14–16",
    theme:"You have risen from the weakest to the strongest. Now prove it.",
    quests:[
      { type:"FINAL BOSS", title:"👑 FAANG-Level System Design Mastery", tasks:[
        {id:"s1",text:"Design a social media feed (ranking, fanout, celebrity problem, real-time updates)"},
        {id:"s2",text:"Design a search engine (crawling, indexing, ranking, typeahead, spell correction)"},
        {id:"s3",text:"Design a video streaming platform (transcoding pipeline, adaptive bitrate, CDN strategy)"},
        {id:"s4",text:"Design a distributed task scheduler (priority queues, exactly-once execution, dead letter)"},
        {id:"s5",text:"Mock interview: explain any design in 45 min with tradeoff analysis"},
      ]},
      { type:"FINAL BOSS", title:"👑 The Interview Gauntlet", tasks:[
        {id:"s6",text:"Complete 30 mock system design interviews (practice with peers or services)"},
        {id:"s7",text:"Complete 30 mock coding interviews (45-min timed sessions)"},
        {id:"s8",text:"Prepare behavioral stories using STAR method: 10 stories covering leadership, conflict, failure, impact"},
        {id:"s9",text:"Research target companies: Grab, Gojek, Tokopedia, Traveloka, Shopee — understand their tech stack and challenges"},
      ]},
      { type:"ULTIMATE", title:"💀 Prove Your Worth — Build Something Real", tasks:[
        {id:"s10",text:"Build an open-source project that demonstrates distributed systems knowledge"},
        {id:"s11",text:"Write 5+ technical blog posts explaining complex concepts simply"},
        {id:"s12",text:"Contribute to a major open-source project (Kubernetes, Kafka, Redis, gRPC, etc.)"},
        {id:"s13",text:"ARISE. Apply to your target companies. You are ready."},
      ]},
    ],
  },
];

const BOOKS = [
  { title:"Designing Data-Intensive Applications", author:"Martin Kleppmann", tag:"THE BIBLE" },
  { title:"System Design Interview Vol 1 & 2", author:"Alex Xu", tag:"ESSENTIAL" },
  { title:"Computer Systems: A Programmer's Perspective", author:"Bryant & O'Hallaron", tag:"LOW-LEVEL" },
  { title:"Understanding Distributed Systems", author:"Roberto Vitillo", tag:"DISTRIBUTED" },
  { title:"Database Internals", author:"Alex Petrov", tag:"STORAGE" },
  { title:"The Staff Engineer's Path", author:"Tanya Reilly", tag:"LEADERSHIP" },
];

const QUEST_COLORS = {
  "MAIN QUEST":"#3b82f6", "SIDE QUEST":"#7b2ff7", "DAILY QUEST":"#00b4d8",
  "BOSS RAID":"#ffc107", "FINAL BOSS":"#ff1744", "ULTIMATE":"#ff006e",
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════

const STORAGE_KEY = "solo-leveling-se-progress";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

let completed = loadState();
let activeGate = 0;
let expandedQuests = {};
let showBooks = false;
let levelUpInfo = null;
let toastMsg = null;
let toastTimer = null;

function showToast(msg) {
  toastMsg = msg;
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastMsg = null; render(); }, 2500);
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════

(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createParticles() {
    particles = Array.from({length: 50}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.25, vy: -Math.random()*0.4-0.08,
      size: Math.random()*2+0.5,
      opacity: Math.random()*0.4+0.08,
      hue: Math.random() > 0.5 ? 265 : 190,
    }));
  }

  resize();
  createParticles();
  window.addEventListener('resize', () => { resize(); createParticles(); });

  function draw() {
    ctx.clearRect(0,0,w,h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -10) { p.y = h+10; p.x = Math.random()*w; }
      if (p.x < -10) p.x = w+10;
      if (p.x > w+10) p.x = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},70%,60%,${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════

function getGateProgress(idx) {
  const g = GATES[idx];
  const all = g.quests.flatMap(q => q.tasks);
  const done = all.filter(t => completed[t.id]).length;
  return { done, total: all.length, pct: all.length ? Math.round((done/all.length)*100) : 0 };
}

function getTotals() {
  const total = GATES.reduce((s,g) => s + g.quests.reduce((s2,q) => s2 + q.tasks.length, 0), 0);
  const done = Object.keys(completed).length;
  return { total, done };
}

function getCurrentRankIdx() {
  let best = 0;
  for (let i = 0; i < GATES.length; i++) {
    if (getGateProgress(i).pct === 100) best = i + 1;
    else break;
  }
  return Math.min(best, RANKS.length-1);
}

function toggleTask(id) {
  const prevRank = getCurrentRankIdx();
  if (completed[id]) delete completed[id];
  else completed[id] = Date.now();
  saveState(completed);
  const newRank = getCurrentRankIdx();
  if (newRank > prevRank && newRank < RANKS.length) {
    levelUpInfo = RANKS[newRank];
  }
  render();
}

// ═══════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════

function exportProgress() {
  const data = JSON.stringify({ version:1, completed, exportedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'solo-leveling-progress.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast("⬇ Progress exported!");
}

function importProgress() {
  document.getElementById('importInput').click();
}

document.getElementById('importInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.completed) {
        completed = data.completed;
        saveState(completed);
        showToast("⬆ Progress imported!");
        render();
      }
    } catch { showToast("✗ Invalid file"); }
  };
  reader.readAsText(file);
  this.value = '';
});

function resetProgress() {
  if (!confirm("⚠ Reset ALL progress? This cannot be undone.")) return;
  completed = {};
  saveState(completed);
  showToast("Progress reset");
  render();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════

function render() {
  const { total, done } = getTotals();
  const level = Math.min(99, Math.floor((done/total)*100));
  const rankIdx = getCurrentRankIdx();
  const rank = RANKS[rankIdx];
  const gate = GATES[activeGate];
  const gp = getGateProgress(activeGate);
  const ri = RANKS[activeGate];

  let html = '';

  // ── STATUS BAR ──
  html += `
  <div class="status-bar">
    <div class="status-inner">
      <div class="rank-badge" style="border-color:${rank.color}; color:${rank.color};
        background:linear-gradient(135deg, ${rank.color}15, ${rank.color}30);
        --glow-color:${rank.glow}; animation: rankFloat 3s ease-in-out infinite, glowPulse 3s infinite;">
        ${rank.rank}
      </div>
      <div class="status-info">
        <div class="status-label">${rank.title} — ${rank.subtitle}</div>
        <div class="xp-bar-wrap">
          <div class="xp-bar">
            <div class="xp-fill" style="--target-width:${(done/total)*100}%;
              background:linear-gradient(90deg, ${rank.color}, ${rank.color}bb);
              box-shadow: 0 0 12px ${rank.glow};"></div>
          </div>
          <span class="level-num" style="color:${rank.color}">LV.${level}</span>
        </div>
      </div>
      <div class="quest-count">${done}/${total} QUESTS</div>
    </div>
  </div>`;

  // ── CONTAINER ──
  html += `<div class="container">`;

  // ── HERO ──
  html += `
  <div class="hero">
    <div class="hero-pre">System Initialized</div>
    <h1>SOLO LEVELING</h1>
    <p class="hero-sub">Senior Software Engineer Ascension Path</p>
    <p class="hero-quote">"I alone level up."</p>
  </div>`;

  // ── GATE TABS ──
  html += `<div class="gate-tabs">`;
  GATES.forEach((g, i) => {
    const p = getGateProgress(i);
    const r = RANKS[i];
    const isActive = i === activeGate;
    const isComplete = p.pct === 100;
    html += `
    <button class="gate-tab ${isActive?'active':''}" onclick="activeGate=${i};expandedQuests={};render()"
      style="${isActive ? `--glow-color:${r.glow}; border-color:${r.color}; background:${r.color}12;` : ''}">
      <span class="rank-letter ${isComplete?'complete':''}"
        style="color:${isActive||isComplete ? r.color : 'var(--text-dim)'};
        ${isComplete ? `--glow-color:${r.glow};` : ''}">${isComplete ? '✦' : r.rank}</span>
      <span class="tab-duration">${g.duration}</span>
      <span class="tab-pct" style="color:${r.color}">${p.pct}%</span>
    </button>`;
  });
  html += `</div>`;

  // ── GATE HEADER ──
  html += `
  <div class="gate-header" style="background:linear-gradient(135deg, ${ri.color}06, ${ri.color}12);
    border-color:${ri.color}30;">
    <div>
      <span class="rank-tag" style="background:${ri.color}20; color:${ri.color}">${ri.rank}-RANK</span>
      <span class="duration-tag">${gate.duration}</span>
    </div>
    <h2 style="color:${ri.color}">${gate.gate}</h2>
    <p class="theme">"${gate.theme}"</p>
    <div class="gate-progress-bar">
      <div class="gate-progress-fill" style="--target-width:${gp.pct}%;
        background:linear-gradient(90deg, ${ri.color}, ${ri.color}aa);
        box-shadow:0 0 10px ${ri.glow};"></div>
    </div>
    <div class="gate-progress-text">${gp.done}/${gp.total} quests cleared — ${gp.pct}%</div>
  </div>`;

  // ── QUESTS ──
  html += `<div class="quest-list">`;
  gate.quests.forEach((quest, qi) => {
    const qKey = `${activeGate}-${qi}`;
    const isExpanded = expandedQuests[qKey];
    const qc = QUEST_COLORS[quest.type] || '#7b2ff7';
    const qDone = quest.tasks.filter(t => completed[t.id]).length;
    const qTotal = quest.tasks.length;

    html += `
    <div class="quest-card ${isExpanded?'expanded':''}" style="--quest-color:${qc}">
      <button class="quest-header" onclick="expandedQuests['${qKey}']=!expandedQuests['${qKey}'];render()">
        <span class="quest-type-badge" style="background:${qc}18; color:${qc}">${quest.type}</span>
        <span class="quest-title">${quest.title}</span>
        <span class="quest-counter" style="color:${qDone===qTotal?'var(--heal-green)':'var(--text-dim)'}">${qDone}/${qTotal}</span>
        <span class="quest-arrow ${isExpanded?'open':''}">▼</span>
      </button>`;

    if (isExpanded) {
      html += `<div class="task-list" style="animation:fadeIn 0.3s ease-out">`;
      quest.tasks.forEach(task => {
        const isDone = !!completed[task.id];
        html += `
        <button class="task-item ${isDone?'done':''}" onclick="toggleTask('${task.id}')">
          <span class="checkbox ${isDone?'checked':''}" style="${isDone ?
            `background:linear-gradient(135deg,${qc},${qc}cc); box-shadow:0 0 14px ${qc}40;` :
            ''}">
            ${isDone ? '✓' : ''}
          </span>
          <span class="task-text ${isDone?'done':''}">${task.text}</span>
        </button>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });
  html += `</div>`;

  // ── SACRED TEXTS ──
  html += `
  <div class="books-section">
    <button class="books-toggle" onclick="showBooks=!showBooks;render()">
      <span style="font-size:18px">📜</span>
      <span style="flex:1; text-align:left">Sacred Texts — Required Reading</span>
      <span class="quest-arrow ${showBooks?'open':''}" style="font-size:10px">▼</span>
    </button>`;
  if (showBooks) {
    html += `<div style="animation:fadeIn 0.3s ease-out">`;
    BOOKS.forEach(b => {
      html += `
      <div class="book-item">
        <span class="book-tag">${b.tag}</span>
        <div style="flex:1">
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // ── FOOTER ACTIONS ──
  html += `
  <div class="footer-actions">
    <button class="footer-btn" onclick="exportProgress()">EXPORT JSON</button>
    <button class="footer-btn" onclick="importProgress()">IMPORT JSON</button>
    <button class="footer-btn danger" onclick="resetProgress()">RESET PROGRESS</button>
  </div>`;

  html += `</div>`; // container

  // ── LEVEL UP OVERLAY ──
  if (levelUpInfo) {
    html += `
    <div class="level-up-overlay" onclick="levelUpInfo=null;render()">
      <div class="level-up-rank" style="color:${levelUpInfo.color};
        text-shadow:0 0 60px ${levelUpInfo.glow}, 0 0 120px ${levelUpInfo.glow};">
        ${levelUpInfo.rank}
      </div>
      <div class="level-up-title" style="color:${levelUpInfo.color}">${levelUpInfo.title.toUpperCase()}</div>
      <div class="level-up-subtitle">${levelUpInfo.subtitle}</div>
      <div class="level-up-dismiss">TAP ANYWHERE TO CONTINUE</div>
    </div>`;
  }

  // ── TOAST ──
  if (toastMsg) {
    html += `<div class="toast">${toastMsg}</div>`;
  }

  document.getElementById('app').innerHTML = html;
}

// Initial render
render();
</script>
</body>
</html>
